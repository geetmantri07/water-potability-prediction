<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Water Potability Prediction</title>

```
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(to right, #74ebd5, #ACB6E5);
    }
    .card {
        border-radius: 15px;
    }
</style>
```

</head>

<body>

<div class="container mt-5">
    <div class="card shadow-lg p-4">

```
    <h2 class="text-center mb-4">💧 Water Potability Prediction</h2>

    <form action="/" method="post">

        <div class="row">

            <div class="col-md-4 mb-3">
                <label class="form-label">pH</label>
                <input type="number" step="any" name="ph" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Hardness</label>
                <input type="number" step="any" name="Hardness" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Solids</label>
                <input type="number" step="any" name="Solids" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Chloramines</label>
                <input type="number" step="any" name="Chloramines" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Sulfate</label>
                <input type="number" step="any" name="Sulfate" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Conductivity</label>
                <input type="number" step="any" name="Conductivity" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Organic Carbon</label>
                <input type="number" step="any" name="Organic_carbon" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Trihalomethanes</label>
                <input type="number" step="any" name="Trihalomethanes" class="form-control" required>
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Turbidity</label>
                <input type="number" step="any" name="Turbidity" class="form-control" required>
            </div>

        </div>

        <div class="text-center mt-3">
            <button type="submit" class="btn btn-primary px-4">Predict</button>
        </div>

    </form>

    {% if context != "Rendering" %}
    <div class="alert mt-4 text-center 
        {% if context == 'Potable' %}alert-success{% else %}alert-danger{% endif %}">
        <h4>Result: {{ context }}</h4>
    </div>
    {% endif %}

</div>
```

</div>

</body>
</html>
